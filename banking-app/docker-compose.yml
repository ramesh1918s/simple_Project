version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankuser -d bankingdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - banking-net

  backend:
    build: ./backend
    container_name: banking-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USER: bankuser
      DB_PASSWORD: bankpass
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banking-net

  frontend:
    build: ./frontend
    container_name: banking-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - banking-net

volumes:
  postgres_data:

networks:
  banking-net:
    driver: bridge
