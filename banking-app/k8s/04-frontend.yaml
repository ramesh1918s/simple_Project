---
# ─── Deployment: Frontend (Nginx) ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app: banking-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: banking-frontend
        tier: frontend
    spec:
      containers:
        - name: banking-frontend
          image: your-registry/banking-frontend:latest   # ← Replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

---
# ─── Service: Frontend ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-service
  namespace: banking
  labels:
    app: banking-frontend
spec:
  selector:
    app: banking-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP

---
# ─── Ingress: Route external traffic ───────────────────────────────────────────
# Requires nginx-ingress-controller installed in your cluster
# For Minikube: minikube addons enable ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-ingress
  namespace: banking
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: banking.yourdomain.com    # ← Replace with your domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: banking-backend-service
                port:
                  number: 5000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: banking-backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: banking-frontend-service
                port:
                  number: 80
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - banking.yourdomain.com
  #     secretName: banking-tls-cert
