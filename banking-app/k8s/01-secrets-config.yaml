---
# ─── ConfigMap: Non-sensitive config ───────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-config
  namespace: banking
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "bankingdb"
  NODE_ENV: "production"
  PORT: "5000"

---
# ─── Secret: Sensitive credentials ─────────────────────────────────────────────
# NOTE: In production, use Vault, Sealed Secrets, or external-secrets-operator.
# These are base64-encoded values of: bankuser / bankpass / bankingdb
apiVersion: v1
kind: Secret
metadata:
  name: banking-secrets
  namespace: banking
type: Opaque
data:
  DB_USER: YmFua3VzZXI=        # bankuser
  DB_PASSWORD: YmFua3Bhc3M=    # bankpass
  POSTGRES_DB: YmFua2luZ2Ri    # bankingdb
  POSTGRES_USER: YmFua3VzZXI=  # bankuser
  POSTGRES_PASSWORD: YmFua3Bhc3M= # bankpass
