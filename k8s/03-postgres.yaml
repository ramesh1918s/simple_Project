---
# ─── Headless Service (Required for StatefulSet) ───────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: banking
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      name: postgres

---
# ─── ConfigMap: Init SQL Script ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: banking
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS accounts (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        account_number VARCHAR(12) UNIQUE NOT NULL,
        full_name VARCHAR(100) NOT NULL,
        email VARCHAR(150) UNIQUE NOT NULL,
        phone VARCHAR(15),
        balance NUMERIC(15,2) DEFAULT 0.00 CHECK (balance >= 0),
        account_type VARCHAR(20) DEFAULT 'SAVINGS',
        status VARCHAR(10) DEFAULT 'ACTIVE',
        created_at TIMESTAMP DEFAULT NOW()
    );

---
# ─── StatefulSet: PostgreSQL ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: banking
spec:
  serviceName: postgres-service
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_NAME

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_PASSWORD

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

            - name: init-script
              mountPath: /docker-entrypoint-initdb.d

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "bankuser"]
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "bankuser"]
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: init-script
          configMap:
            name: postgres-init-sql

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard
