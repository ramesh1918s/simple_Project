# ---
# ─── Deployment: Frontend ─────────────────────────────────────────────────────
# Dockerfile: nginx:1.25-alpine, nginx user(101), port 80
# nginx.conf: proxies /api/* → http://banking-backend:5000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking
  labels:
    app: banking-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: banking-frontend
        tier: frontend
    spec:
      terminationGracePeriodSeconds: 30
      # ✅ Matches Dockerfile: nginx user UID=101
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx user inside nginx:1.25-alpine
        runAsGroup: 101
      containers:
        - name: banking-frontend
          image: shivaram1918/banking-frontend:latest # CI/CD replaces this tag
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          # ✅ Matches Dockerfile HEALTHCHECK — / on port 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
# ─── Service: Frontend (LoadBalancer) ────────────────────────────────────────
# 
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-service
  namespace: banking
  labels:
    app: banking-frontend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  selector:
    app: banking-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
  type: LoadBalancer
---
# ─── PodDisruptionBudget ──────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: banking
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: banking-frontend
---
# ─── HorizontalPodAutoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: banking-frontend-hpa
  namespace: banking
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: banking-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
