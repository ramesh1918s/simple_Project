apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-config
  namespace: banking
  labels:
    app: banking-app
data:
  NODE_ENV: "production"
  PORT:     "5000"
  DB_HOST:  "postgres-service"   # StatefulSet headless service name
  DB_PORT:  "5432"
  DB_NAME:  "bankingdb"