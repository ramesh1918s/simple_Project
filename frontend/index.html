<!DOCTYPE html>
<html>
<head>
  <title>Tasks</title>
</head>
<body>
  <h1>Tasks</h1>
  <ul id="tasks"></ul>

  <script>
    fetch('http://localhost:3000/tasks')
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('tasks');
        data.forEach(task => {
          const li = document.createElement('li');
          li.innerText = task.title;
          list.appendChild(li);
        });
      });
  </script>
</body>
</html>
